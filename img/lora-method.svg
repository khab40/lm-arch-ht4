<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">LoRA method overview</title>
  <desc id="desc">A professional diagram showing a frozen base projection and trainable low-rank residual branch.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1L9 5L1 9Z" fill="#60717a"/></marker><filter id="shadow" x="-8%" y="-12%" width="116%" height="124%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#12202a" flood-opacity="0.10"/></filter></defs>
  <rect width="1280" height="620" fill="#f6f8fa"/>
  <g transform="translate(64 58)"><text x="0" y="0" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="760">LoRA: parameter-efficient adaptation</text><text x="0" y="40" fill="#53616a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">The pretrained projection remains fixed; the adapter learns a compact residual update.</text></g>
  <g transform="translate(72 186)" filter="url(#shadow)"><rect x="0" y="0" width="148" height="76" rx="6" fill="#ffffff" stroke="#d8e0e5"/><text x="50" y="45" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="730">x</text></g>
  <g transform="translate(314 132)" filter="url(#shadow)"><rect x="0" y="0" width="330" height="178" rx="8" fill="#ffffff" stroke="#d8e0e5"/><rect x="0" y="0" width="330" height="42" rx="8" fill="#17212a"/><path d="M0 32H330V42H0Z" fill="#17212a"/><text x="22" y="27" fill="#f3f7f9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="740">frozen base projection</text><text x="22" y="86" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="760">W<tspan baseline-shift="sub" font-size="15">0</tspan>x + b</text><text x="22" y="120" fill="#69777f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">original model weights</text><text x="22" y="151" fill="#b26a00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="720">not trainable</text></g>
  <g transform="translate(314 396)" filter="url(#shadow)"><rect x="0" y="0" width="330" height="130" rx="8" fill="#ffffff" stroke="#bde9df"/><rect x="0" y="0" width="330" height="40" rx="8" fill="#e8fbf6"/><path d="M0 30H330V40H0Z" fill="#e8fbf6"/><text x="22" y="26" fill="#116357" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="760">trainable low-rank path</text><rect x="42" y="70" width="92" height="34" rx="4" fill="#34d6bb"/><text x="80" y="92" fill="#072b27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">A</text><rect x="186" y="60" width="50" height="54" rx="4" fill="#1f9f89"/><text x="205" y="92" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">B</text><path d="M134 87H186" stroke="#60717a" stroke-width="2.4" marker-end="url(#arrow)"/><text x="258" y="92" fill="#116357" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="720">rank r</text></g>
  <g transform="translate(742 242)" filter="url(#shadow)"><circle cx="46" cy="46" r="42" fill="#ffffff" stroke="#d8e0e5"/><text x="33" y="59" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">+</text></g>
  <g transform="translate(920 186)" filter="url(#shadow)"><rect x="0" y="0" width="230" height="76" rx="6" fill="#111820"/><text x="88" y="45" fill="#f3f7f9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="730">y</text></g>
  <g transform="translate(748 396)" filter="url(#shadow)"><rect x="0" y="0" width="402" height="110" rx="8" fill="#ffffff" stroke="#d8e0e5"/><text x="24" y="38" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="760">effective layer output</text><text x="24" y="78" fill="#53616a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">y = W<tspan baseline-shift="sub" font-size="15">0</tspan>x + b + (alpha / r) B A x</text></g>
  <g stroke="#60717a" stroke-width="2.8" fill="none" marker-end="url(#arrow)"><path d="M220 224H314"/><path d="M220 224C268 224 268 461 314 461"/><path d="M644 221H742"/><path d="M644 461C706 461 706 288 742 288"/><path d="M834 288C878 288 876 224 920 224"/></g>
  <g transform="translate(72 558)"><rect x="0" y="0" width="1078" height="34" rx="5" fill="#e9eef2"/><text x="18" y="23" fill="#53616a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Only A and B are optimized, so adaptation is small, portable, and easy to merge or save separately.</text></g>
</svg>
