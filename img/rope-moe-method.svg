  <g transform="translate(64 58)"><text x="0" y="0" fill="#111820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="760">RoPE + MoE transformer block</text><text x="0" y="40" fill="#53616a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">Rotary attention encodes position; sparse experts increase capacity without activating every FFN.</text></g>
