  <g transform="translate(70 630)"><rect x="0" y="0" width="1140" height="42" rx="6" fill="#17212a"/><text x="24" y="27" fill="#f3f7f9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Block flow: token embeddings -&gt; RoPE attention -&gt; residual path -&gt; routed expert FFN -&gt; loss and drop-rate evaluation.</text></g>
